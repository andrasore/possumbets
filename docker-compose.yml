services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: betting
      POSTGRES_USER: betting
      POSTGRES_PASSWORD: betting_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betting"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: betting
      RABBITMQ_DEFAULT_PASS: betting_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.17.3
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "/tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle 2>/dev/null || true &&
       /tigerbeetle start --addresses=0.0.0.0:6000 /data/0_0.tigerbeetle"
    volumes:
      - tigerbeetle_data:/data
    ports:
      - "6000:6000"
    security_opt:
      - seccomp=unconfined  # TigerBeetle requires io_uring; Docker's default seccomp profile blocks it
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1770' /proc/net/tcp || grep -q ':1770' /proc/net/tcp6"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  keycloak_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_dev
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    build: ./keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8090
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8090:8080"
    depends_on:
      keycloak_postgres:
        condition: service_healthy

  # ── Application Services ───────────────────────────────────────────────────

  core:
    build:
      context: .
      target: core
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://betting:betting_dev@postgres:5432/betting
      RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
      TIGERBEETLE_ADDRESS: tigerbeetle:6000
      TIGERBEETLE_CLUSTER_ID: "0"
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://localhost:8090/realms/betting
      KEYCLOAK_REALM: betting
      KEYCLOAK_ADMIN_CLIENT_ID: betting-core
      KEYCLOAK_ADMIN_CLIENT_SECRET: betting-core-secret
    ports:
      - "4000:4000"
    security_opt:
      - seccomp=unconfined  # TigerBeetle requires io_uring; Docker's default seccomp profile blocks it
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tigerbeetle:
        condition: service_healthy
      keycloak:
        condition: service_started

  odds:
    build:
      context: .
      target: odds
    environment:
      RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
      DATABASE_URL: postgresql://betting:betting_dev@postgres:5432/betting
      ODDS_PROVIDER: mock
      ODDS_STORAGE: postgres
      POLL_INTERVAL_SECONDS: 30
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notifications:
    build:
      context: .
      target: notifications
    environment:
      RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://localhost:8090/realms/betting
      KEYCLOAK_REALM: betting
    depends_on:
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - core
      - notifications

  frontend:
    build:
      context: .
      target: frontend
    environment:
      KEYCLOAK_URL: http://localhost:8090
      KEYCLOAK_REALM: betting
      KEYCLOAK_CLIENT_ID: betting-frontend
      GATEWAY_PORT: "8080"
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  postgres_data:
  tigerbeetle_data:
  keycloak_postgres_data:
